<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">ScieMD scientific writing workflow</title>
  <desc id="desc">A generated workflow diagram showing one Markdown document moving through visual drafting, scientific structure, LLM review, and publication outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbf8"/>
      <stop offset="0.52" stop-color="#eef6f3"/>
      <stop offset="1" stop-color="#f8f4ee"/>
    </linearGradient>
    <linearGradient id="doc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f7f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#173f35" flood-opacity="0.14"/>
    </filter>
    <style>
      .label { font: 700 24px 'Scie Sans', sans-serif; fill: #173f35; }
      .small { font: 600 16px 'Scie Sans', sans-serif; fill: #5f716a; }
      .mono { font: 700 16px 'JetBrains Mono', monospace; fill: #55766b; }
      .pill { fill: #ffffff; stroke: #c9d8d2; stroke-width: 2; }
      .accent { fill: #4f7c68; }
      .warn { fill: #a94a50; }
      .purple { fill: #7663b8; }
      .line { stroke: #89a99c; stroke-width: 4; stroke-linecap: round; fill: none; }
    </style>
  </defs>

  <rect width="1280" height="520" fill="url(#bg)"/>
  <circle cx="112" cy="92" r="52" fill="#dcece6" opacity="0.6"/>
  <circle cx="1175" cy="438" r="78" fill="#efe7fb" opacity="0.58"/>

  <g filter="url(#shadow)">
    <rect x="86" y="76" width="292" height="368" rx="18" fill="url(#doc)" stroke="#d1ded9"/>
    <rect x="126" y="118" width="156" height="20" rx="6" fill="#173f35"/>
    <rect x="126" y="160" width="210" height="12" rx="6" fill="#aac5bb"/>
    <rect x="126" y="188" width="168" height="12" rx="6" fill="#d5e2dd"/>
    <rect x="126" y="216" width="226" height="12" rx="6" fill="#d5e2dd"/>
    <rect x="126" y="258" width="212" height="78" rx="10" fill="#f7eee5" stroke="#dccdbb"/>
    <text x="146" y="288" class="mono">:::figure</text>
    <rect x="146" y="306" width="150" height="10" rx="5" fill="#c89a6a" opacity="0.45"/>
    <rect x="126" y="360" width="120" height="12" rx="6" fill="#aac5bb"/>
    <rect x="126" y="386" width="190" height="12" rx="6" fill="#d5e2dd"/>
  </g>

  <path class="line" d="M408 260 C470 260 470 260 532 260"/>
  <path d="M532 260 l-18 -12 v24 z" fill="#89a99c"/>

  <g>
    <rect x="560" y="76" width="160" height="78" rx="18" class="pill"/>
    <circle cx="590" cy="115" r="15" class="accent"/>
    <text x="620" y="110" class="small">Visual</text>
    <text x="620" y="132" class="small">drafting</text>

    <rect x="744" y="76" width="180" height="78" rx="18" class="pill"/>
    <circle cx="774" cy="115" r="15" fill="#c59a5f"/>
    <text x="804" y="110" class="small">Blocks +</text>
    <text x="804" y="132" class="small">labels</text>

    <rect x="948" y="76" width="180" height="78" rx="18" class="pill"/>
    <circle cx="978" cy="115" r="15" class="purple"/>
    <text x="1008" y="110" class="small">LLM review</text>
    <text x="1008" y="132" class="small">with locks</text>

    <rect x="560" y="248" width="160" height="78" rx="18" class="pill"/>
    <circle cx="590" cy="287" r="15" fill="#5576a8"/>
    <text x="620" y="282" class="small">Citations</text>
    <text x="620" y="304" class="small">+ refs</text>

    <rect x="744" y="248" width="180" height="78" rx="18" class="pill"/>
    <circle cx="774" cy="287" r="15" class="warn"/>
    <text x="804" y="282" class="small">Variables</text>
    <text x="804" y="304" class="small">from data</text>

    <rect x="948" y="248" width="180" height="78" rx="18" class="pill"/>
    <circle cx="978" cy="287" r="15" fill="#4f7c68"/>
    <text x="1008" y="282" class="small">Clean</text>
    <text x="1008" y="304" class="small">exports</text>
  </g>

  <path class="line" d="M634 164 V224"/>
  <path class="line" d="M836 164 V224"/>
  <path class="line" d="M1038 164 V224"/>
  <path class="line" d="M720 287 H744"/>
  <path class="line" d="M924 287 H948"/>

  <g filter="url(#shadow)">
    <rect x="520" y="382" width="650" height="72" rx="18" fill="#173f35"/>
    <text x="552" y="426" font-family="Scie Sans, sans-serif" font-size="25" font-weight="760" fill="#ffffff">One clean .md source, many scientific outputs</text>
    <text x="1062" y="426" class="mono" fill="#cfe4dc">.md</text>
  </g>
</svg>
