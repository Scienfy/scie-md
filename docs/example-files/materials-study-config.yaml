---
# ScieMD YAML feature coverage file.
# This file is valid YAML and intentionally includes preservation-sensitive features.

study:
  id: SCMD-STRUCT-2026-001
  title: Ultrasonic spray coating parameter sweep
  status: analysis-ready
  created_at: 2026-06-30T13:45:00Z
  optional_external_doi: null
  tags:
    - structured-data
    - yaml
    - preservation-warning

defaults: &sample_defaults
  substrate: glass
  operator: AR
  environment:
    temperature_c: 22.5
    relative_humidity_percent: 38.2
  qc:
    reviewed: false
    status: review
    flags: []

acceptance_criteria:
  thickness_nm:
    min: 90
    target: 120
    max: 155
  roughness_nm:
    min: 0
    target: 8
    max: 18
  defect_density_per_mm2:
    min: 0
    target: 0.4
    max: 2.0

protocol:
  description: |
    Clean substrates, deposit primer, spray active layer, and anneal.
    Literal block scalars should remain readable in source mode.
  short_summary: >
    Folded block text is useful for notes that should display as a paragraph
    while still being easy to wrap across source lines.
  steps:
    - index: 1
      name: Substrate clean
      duration_min: 12
      reagents: [isopropanol, deionized_water]
    - index: 2
      name: Primer deposition
      duration_min: 6
      reagents:
        - primer_A
    - index: 3
      name: Active layer spray
      duration_min: 18
      reagents:
        - ink_alpha
        - ink_beta
    - index: 4
      name: Anneal
      duration_min: 30
      reagents: []

samples:
  - <<: *sample_defaults
    sample_id: S-001
    batch: B-2026-06-A
    parameters:
      flow_rate_ml_min: 0.18
      stage_speed_mm_s: 8.5
      passes: 3
      anneal_profile: [25, 60, 85, 85, 40]
    measurements:
      thickness_nm: 118.4
      roughness_nm: 7.8
      defect_density_per_mm2: 0.3
      coverage_percent: 98.7
    qc:
      reviewed: true
      status: pass
      flags: []
      reviewed_at: 2026-06-30T15:10:00Z
  - <<: *sample_defaults
    sample_id: S-002
    batch: B-2026-06-A
    operator: MC
    parameters:
      flow_rate_ml_min: 0.22
      stage_speed_mm_s: 8.5
      passes: 3
      anneal_profile:
        - 25
        - 60
        - 85
        - 85
        - 40
    measurements:
      thickness_nm: 141.2
      roughness_nm: 12.4
      defect_density_per_mm2: 1.2
      coverage_percent: 97.9
    qc:
      reviewed: false
      status: review
      flags: &roughness_flags
        - roughness_high
        - needs_second_sem_image
      reviewed_at: null
  - <<: *sample_defaults
    sample_id: S-003
    batch: B-2026-06-B
    substrate: silicon
    parameters:
      flow_rate_ml_min: 0.16
      stage_speed_mm_s: 10.0
      passes: 4
      anneal_profile: [25, 70, 90, 90, 45]
    measurements:
      thickness_nm: 109.9
      roughness_nm: 6.4
      defect_density_per_mm2: 0.2
      coverage_percent: 99.1
    qc:
      reviewed: true
      status: pass
      flags:
        - best_candidate
      reviewed_at: 2026-06-30T16:02:00Z

analysis:
  primary_metric: coverage_percent
  secondary_metrics:
    - thickness_nm
    - roughness_nm
    - defect_density_per_mm2
  roughness_flags_copy: *roughness_flags
  model:
    name: random_forest_regressor
    version: 0.4.1
    random_seed: 72630
    performance:
      rmse: 3.42
      r2: 0.83
      fold_scores: [0.81, 0.84, 0.82, 0.86, 0.80]
  recommendations:
    - rank: 1
      sample_id: S-003
      reason: Lowest roughness with high coverage.
      next_actions:
        - repeat_with_n3
        - lock_humidity
        - collect_second_sem_field
    - rank: 2
      sample_id: S-001
      reason: Balanced thickness and defect density.
      next_actions:
        - repeat_with_additive_A
        - compare_against_S003

attachments:
  sem_image: assets/sem/S-001-field-a.tif
  profile_trace: assets/profilometry/S-003-line-02.csv
  empty_list: []
  empty_map: {}
