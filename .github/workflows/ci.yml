name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app:
    name: Desktop app checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Build frontend
        run: npm run build

      - name: Test frontend
        run: npm run test

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit

  vscode-extension:
    name: VS Code extension checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scie-md-vscode-extension/package-lock.json

      - name: Install extension dependencies
        working-directory: scie-md-vscode-extension
        run: npm ci

      - name: Audit extension dependencies
        working-directory: scie-md-vscode-extension
        run: npm audit --audit-level=high

      - name: Build extension
        working-directory: scie-md-vscode-extension
        run: npm run build

      - name: Test extension
        working-directory: scie-md-vscode-extension
        run: npm run test
