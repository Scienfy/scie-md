name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app:
    name: Desktop app checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Build frontend
        run: npm run build

      - name: Test frontend
        run: npm run test

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit

  vscode-extension:
    name: VS Code extension checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            scie-md-vscode-extension/package-lock.json

      - name: Install shared core dependencies
        run: npm ci --workspace packages/core --include-workspace-root=false

      - name: Install extension dependencies
        working-directory: scie-md-vscode-extension
        run: npm ci

      - name: Audit extension dependencies
        working-directory: scie-md-vscode-extension
        run: npm audit --audit-level=high

      - name: Build extension
        working-directory: scie-md-vscode-extension
        run: npm run build

      - name: Test extension
        working-directory: scie-md-vscode-extension
        run: npm run test

      - name: Package extension
        working-directory: scie-md-vscode-extension
        run: npm run package

      - name: Validate extension package
        run: npm run validate:vscode-package

      - name: Ensure VS Code CLI
        shell: pwsh
        run: |
          if (-not (Get-Command code -ErrorAction SilentlyContinue)) {
            choco install vscode -y --no-progress
          }
          code --version

      - name: Installed VSIX smoke
        run: npm run validate:vscode-installed-smoke -- --required

  release-gates:
    name: Release gate checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python font tooling
        run: python -m pip install fonttools brotli

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install dependencies
        run: npm ci

      - name: Install extension dependencies
        run: npm run install:vscode

      - name: Run release validation
        run: npm run validate:release

      - name: Package VS Code extension
        run: npm run package:vscode

      - name: Validate VS Code extension package
        run: npm run validate:vscode-package

      - name: Ensure VS Code CLI
        shell: pwsh
        run: |
          if (-not (Get-Command code -ErrorAction SilentlyContinue)) {
            choco install vscode -y --no-progress
          }
          code --version

      - name: Installed VSIX smoke
        run: npm run validate:vscode-installed-smoke -- --required
