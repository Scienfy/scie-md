name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and publish, for example v1.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python font tooling
        run: python -m pip install fonttools brotli

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install dependencies
        run: npm ci

      - name: Ensure VS Code CLI
        shell: pwsh
        run: |
          if (-not (Get-Command code -ErrorAction SilentlyContinue)) {
            choco install vscode -y --no-progress
          }
          $codeBin = Join-Path $env:ProgramFiles 'Microsoft VS Code\bin'
          if (Test-Path $codeBin) {
            $codeBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:Path = "$codeBin;$env:Path"
          }
          code --version

      - name: Build release artifacts
        run: npm run release:local

      - name: Stage Windows release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets/windows | Out-Null
          Copy-Item artifacts/installers/*.exe release-assets/windows/
          Copy-Item artifacts/installers/*.msi release-assets/windows/
          Copy-Item artifacts/installers/*.vsix release-assets/windows/
          Copy-Item artifacts/SHA256SUMS.txt release-assets/windows/SHA256SUMS-windows.txt

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-assets
          path: release-assets/windows/*

  macos:
    name: Build macOS installers
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python font tooling
        run: python -m pip install fonttools brotli

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install dependencies
        run: npm ci

      - name: Build macOS desktop bundles
        run: npm run build:desktop

      - name: Stage macOS release assets
        shell: bash
        run: |
          mkdir -p release-assets/macos
          find src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name '*.app.tar.gz' \) -exec cp {} release-assets/macos/ \;
          cd release-assets/macos
          shasum -a 256 * > SHA256SUMS-macos.txt

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-assets
          path: release-assets/macos/*

  linux:
    name: Build Linux installers
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install Python font tooling
        run: python -m pip install fonttools brotli

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install dependencies
        run: npm ci

      - name: Build Linux desktop bundles
        run: npm run build:desktop:linux

      - name: Stage Linux release assets
        shell: bash
        run: |
          mkdir -p release-assets/linux
          mapfile -t linux_assets < <(find src-tauri/target/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' \) | sort)
          if [ "${#linux_assets[@]}" -eq 0 ]; then
            echo "::error::No Linux installer assets were produced."
            exit 1
          fi
          cp "${linux_assets[@]}" release-assets/linux/
          cd release-assets/linux
          sha256sum * > SHA256SUMS-linux.txt

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-assets
          path: release-assets/linux/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
      - linux

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md <<'NOTES'
          ScieMD 1.1.0 structured data preview.

          Highlights:
          - Adds structured document support alongside Markdown for JSON, JSONL/NDJSON, YAML, TOML, XML, CSV/TSV, and plain text.
          - Adds visual structured views for JSON trees, JSON object-array tables, JSONL records, tabular data, health diagnostics, schema-aware JSON checks, and read-only YAML/TOML/XML previews.
          - Adds guarded visual editing for JSON, JSONL, CSV, and TSV with validation, review, and stale-source checks.
          - Adds Windows Open With / Default Apps registration for supported non-CSV structured formats; CSV remains Excel-friendly at the OS level while still opening inside ScieMD.
          - Adds command-based structured preview support in the VS Code extension without hijacking VS Code's default structured-data editors.

          Download the installer for your operating system from the assets below.

          Windows:
          - Use `ScieMD_*_x64-setup.exe` for normal installation.
          - Use the `.msi` only if your environment requires MSI installers.
          - During interactive setup, ScieMD can open Windows Default Apps so you can approve ScieMD for supported file types.

          Linux:
          - Use `ScieMD_*_amd64.AppImage` for a portable Linux build.
          - Use `ScieMD_*_amd64.deb` on Debian, Ubuntu, and compatible distributions.

          VS Code:
          - Install `sciemd-vscode-*.vsix` from VS Code's Extensions view or with `code --install-extension`.

          macOS:
          - Use the `.dmg` asset.
          - Unsigned preview builds may require right-clicking the app and choosing Open.

          Verify downloads with the included SHA-256 checksum files.
          NOTES

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: scienfy/scie-md
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "ScieMD $TAG" --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" --clobber \
              release-assets/windows-release-assets/* \
              release-assets/macos-release-assets/* \
              release-assets/linux-release-assets/*
          else
            gh release create "$TAG" \
              --title "ScieMD $TAG" \
              --notes-file RELEASE_NOTES.md \
              release-assets/windows-release-assets/* \
              release-assets/macos-release-assets/* \
              release-assets/linux-release-assets/*
          fi
