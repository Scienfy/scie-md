version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      root-npm-dependencies:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: /scie-md-vscode-extension
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      vscode-extension-npm-dependencies:
        patterns:
          - "*"
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tauri-rust-dependencies:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
