name: Bug Report
description: Report a reproducible ScieMD problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ScieMD. Do not include private research data unless it is necessary and safe to share.
  - type: input
    id: version
    attributes:
      label: ScieMD version
      description: Use the app version, release tag, or commit if known.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Desktop app
        - VS Code extension
        - Export output
        - Installer or updater
        - Documentation
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest sequence that triggers the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots if they do not contain private data.
      render: text
